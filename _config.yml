title: FitnessDailyTips
description: "Your daily source for fitness tips, workout routines, exercise guides, and healthy living advice."
url: "https://kkumakkuma.github.io"
baseurl: "/FitnessDailyTips"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: FitnessDailyTips
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-R8ZKVR0L3L"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
